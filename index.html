<!DOCTYPE html>

    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* 玻璃拟态 UI 样式 */
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 215, 0, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(218, 165, 32, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(218, 165, 32, 0.8); }

        .civ-gold { color: #facc15; }
        .civ-green { color: #4ade80; }
        .civ-border { border-color: rgba(250, 204, 21, 0.4); }
        .civ-hover:hover { background: rgba(250, 204, 21, 0.15); border-color: rgba(250, 204, 21, 0.8); }

        .slide-in { animation: slideIn 0.4s ease-out forwards; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>

            { type: 'natural', id: 'kilimanjaro', name: '乞力马扎罗山', era: '自然', games: [5, 6, 7], lat: -3.067, lon: 37.355, wiki: 'Mount_Kilimanjaro', gamePic: 'Mount_Kilimanjaro_(Civ6).png', realDesc: '非洲最高峰，赤道上的雪山，著名的活火山。', gameDesc: '【历代核心】提供食物与文化。在 5 代中路过的部队获得“高山训练”移动晋升。' },
            { type: 'natural', id: 'uluru', name: '乌鲁鲁', era: '自然', games: [5, 6, 7], lat: -25.344, lon: 131.036, wiki: 'Uluru', gamePic: 'Uluru_(Civ6).png', realDesc: '澳大利亚红土中心的巨大单体岩石，土著人的神山。', gameDesc: '【历代核心】在干旱的沙漠中拔地而起，提供巨量信仰与文化值、快乐度。' },
            { type: 'natural', id: 'mt_fuji', name: '富士山', era: '自然', games: [5, 7], lat: 35.360, lon: 138.727, wiki: 'Mount_Fuji', gamePic: 'Mount_Fuji_(Civ7).png', realDesc: '日本著名的活火山，完美的锥形山体是文化象征。', gameDesc: '【文明5/7】提供金币、文化与快乐度，宗教与美学的完美结合。' },
            { type: 'natural', id: 'everest', name: '珠穆朗玛峰', era: '自然', games: [6, 7], lat: 27.988, lon: 86.925, wiki: 'Mount_Everest', gamePic: 'Mount_Everest_(Civ6).png', realDesc: '地球第一高峰，位于喜马拉雅山脉。', gameDesc: '【文明6/7】提供信仰值，临近单位在丘陵移动时不消耗额外移动力。' },

            // 文明5 特色自然奇观
            { type: 'natural', id: 'fountain_youth', name: '青春之泉', era: '自然', games: [5], lat: 29.894, lon: -81.314, wiki: 'Fountain_of_Youth', gamePic: 'Fountain_of_Youth_(Civ5).png', realDesc: '传说中能让人返老还童的泉水，大航海时代探险家们的追求（坐标标于佛罗里达）。', gameDesc: '【文明5】提供极高的+10笑脸，且路过的军事单位生命恢复速度永久翻倍！' },
            { type: 'natural', id: 'el_dorado', name: '黄金国', era: '自然', games: [5], lat: 4.598, lon: -73.964, wiki: 'Lake_Guatavita', gamePic: 'El_Dorado_(Civ5).png', realDesc: '南美洲探险家梦寐以求的黄金城（坐标标于瓜塔维塔湖）。', gameDesc: '【文明5】首个发现它的文明会立刻获得 500 金币的巨额初始资金。' },
            { type: 'natural', id: 'solomons_mines', name: '所罗门王的宝藏', era: '自然', games: [5], lat: 29.771, lon: 34.973, wiki: 'Timna_Valley', gamePic: 'King_Solomon%27s_Mines_(Civ5).png', realDesc: '传说中蕴藏无尽财富的古代矿区（标于亭纳山谷）。', gameDesc: '【文明5】该地块直接提供不可思议的 +6 生产力。' },
            { type: 'natural', id: 'krakatoa', name: '喀拉喀托火山', era: '自然', games: [5], lat: -6.102, lon: 105.423, wiki: 'Krakatoa', gamePic: 'Krakatoa_(Civ5).png', realDesc: '印尼著名的火山，1883年的大爆发震撼了整个世界。', gameDesc: '【文明5】提供 5 点科学值，是海岛文明跃进科技的关键。' },
            { type: 'natural', id: 'lake_victoria', name: '维多利亚湖', era: '自然', games: [5], lat: -1.000, lon: 33.000, wiki: 'Lake_Victoria', gamePic: 'Lake_Victoria_(Civ5).png', realDesc: '非洲最大的淡水湖，尼罗河的源头之一。', gameDesc: '【文明5】提供惊人的 +6 食物产出，人口爆炸的催化剂。' },
            
            // 文明6 特色自然奇观
            { type: 'natural', id: 'bermuda_triangle', name: '百慕大三角', era: '自然', games: [6, 7], lat: 25.000, lon: -71.000, wiki: 'Bermuda_Triangle', gamePic: 'Bermuda_Triangle_(Civ6).png', realDesc: '北大西洋中的神秘海域，以飞机和船只离奇失踪而闻名。', gameDesc: '【文明6/7】单位进入时获得永久+1移动力并被随机传送到大洋深处，提供极高科技值。' },
            { type: 'natural', id: 'paititi', name: '帕提提', era: '自然', games: [6], lat: -12.500, lon: -71.500, wiki: 'Paititi', gamePic: 'Paititi_(Civ6).png', realDesc: '南美传说中的印加避难所和黄金城。', gameDesc: '【文明6】提供夸张的文化与金币加成，周边商业中心金币产出直接起飞。' },
            { type: 'natural', id: 'dead_sea', name: '死海', era: '自然', games: [6], lat: 31.500, lon: 35.500, wiki: 'Dead_Sea', gamePic: 'Dead_Sea_(Civ6).png', realDesc: '位于约旦和以色列边境，地球上海拔最低且盐度极高的湖泊。', gameDesc: '【文明6】提供信仰与文化。残血单位只要在其旁边驻扎一回合即可瞬间满血。' },
            
            // 文明7 特色自然奇观
            { type: 'natural', id: 'grand_canyon', name: '大峡谷', era: '自然', games: [7], lat: 36.106, lon: -112.112, wiki: 'Grand_Canyon', gamePic: 'Grand_Canyon_(Civ7).png', realDesc: '美国科罗拉多河切割出的巨大峡谷，地球的地质宝库。', gameDesc: '【文明7】占据4格菱形，提供大量快乐度、文化，并为该城市所有平原提供科研。' },
            { type: 'natural', id: 'hoerikwaggo', name: '桌山', era: '自然', games: [7], lat: -33.962, lon: 18.409, wiki: 'Table_Mountain', gamePic: 'Hoerikwaggo_(Civ7).png', realDesc: '南非开普敦的地标，形如巨大桌面的平顶山。', gameDesc: '【文明7】提供食物与文化，并为其周围的 Quarter 街区提供额外快乐度。' },
            { type: 'natural', id: 'iguazu', name: '伊瓜苏瀑布', era: '自然', games: [7], lat: -25.695, lon: -54.436, wiki: 'Iguazu_Falls', gamePic: 'Iguazu_Falls_(Civ7).png', realDesc: '阿根廷与巴西边界的世界最大瀑布群。', gameDesc: '【文明7】提供大量淡水、食物与快乐度，相邻区划获得+2生产力。' },
            { type: 'natural', id: 'machapuchare', name: '鱼尾峰', era: '自然', games: [7], lat: 28.495, lon: 83.948, wiki: 'Machapuchare', gamePic: 'Machapuchare_(Civ7).png', realDesc: '尼泊尔境内的神圣山峰，因其形状似鱼尾而得名。', gameDesc: '【文明7】提供生产力与文化，让整个定居点的粗糙与山地地形获得快乐度。' },
            { type: 'natural', id: 'vinicunca', name: '彩虹山', era: '自然', games: [7], lat: -13.870, lon: -71.303, wiki: 'Vinicunca', gamePic: 'Vinicunca_(Civ7).png', realDesc: '秘鲁安第斯山脉中的地质奇观，因矿物沉积呈现七彩纹理。', gameDesc: '【文明7】十字路口DLC扩展包内容，提供非凡的视觉与独特的产出。' }
        ];

        // --- 全局变量与控制逻辑 ---
        let scene, camera, renderer, controls, earthGroup;
        const EARTH_RADIUS = 5;
        let markers = [];
        let textSprites = [];
        let raycaster, mouse;
        let isAnimatingCamera = false;
        let targetCameraPos = new THREE.Vector3();
        let isWonderSelected = false;

        // --- UI 渲染与列表逻辑 ---
        function initUI() {
            const listContainer = document.getElementById('wonder-list');
            
            wondersData.sort((a, b) => {
                if(a.type !== b.type) return a.type.localeCompare(b.type); // 世界奇观在前，自然奇观在后
                return a.name.localeCompare(b.name);
            }).forEach((wonder) => {
                const item = document.createElement('div');
                const isNatural = wonder.type === 'natural';
                item.className = 'p-3 rounded-lg border border-transparent civ-hover cursor-pointer transition-colors duration-200';
                
                // 动态生成版本 Tag 徽章
                const gameTags = wonder.games.map(g => {
                    let cls = g === 5 ? 'bg-blue-900/60 text-blue-300 border-blue-700/50' : 
                             (g === 6 ? 'bg-purple-900/60 text-purple-300 border-purple-700/50' : 'bg-red-900/60 text-red-300 border-red-700/50');
                    let txt = g === 5 ? 'V' : (g === 6 ? 'VI' : 'VII');
                    return `<span class="text-[9px] px-1 rounded mx-[1px] border ${cls}">${txt}</span>`;
                }).join('');

                item.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="font-bold ${isNatural ? 'civ-green' : 'text-gray-200'}">${wonder.name}</span>
                            <div class="flex mt-1">${gameTags}</div>
                        </div>
                        <span class="text-[10px] ${isNatural ? 'text-green-600 bg-green-900/30' : 'text-yellow-600 bg-yellow-900/30'} px-2 py-1 rounded uppercase whitespace-nowrap ml-2">
                            ${isNatural ? '自然奇观' : wonder.era}
                        </span>
                    </div>
                `;
                item.onclick = () => focusOnWonder(wonder);
                listContainer.appendChild(item);
            });
        }

        // 高级 Fallback 渲染器 (应对防盗链或图库缺失)
        function getFallbackImage(title, subtitle, isGame) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 300;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 400, 300);
            if (isGame) { gradient.addColorStop(0, '#1a1a1a'); gradient.addColorStop(1, '#2d2d2d'); }
            else { gradient.addColorStop(0, '#1e293b'); gradient.addColorStop(1, '#0f172a'); }
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, 400, 300);
            ctx.strokeStyle = isGame ? '#facc15' : '#475569';
            ctx.lineWidth = 4; ctx.strokeRect(2, 2, 396, 296);
            ctx.fillStyle = isGame ? '#facc15' : '#f8fafc';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = 'bold 24px "Segoe UI", sans-serif'; ctx.fillText(title, 200, 130);
            ctx.font = '14px "Segoe UI", sans-serif'; ctx.fillStyle = '#94a3b8';
            ctx.fillText(subtitle, 200, 170);
            return canvas.toDataURL();
        }

        function showDetailPanel(wonder) {
            const panel = document.getElementById('detail-panel');
            panel.classList.remove('hidden');
            isWonderSelected = true;
            updateCameraOffset(true);

            const isNatural = wonder.type === 'natural';
            document.getElementById('detail-type-era').innerText = `${isNatural ? '自然奇观' : '人造奇观'} · ${wonder.era}`;
            document.getElementById('detail-type-era').className = `text-sm font-bold ${isNatural ? 'text-green-400' : 'text-yellow-500'}`;
            
            // 渲染面板内部的世代 Tag
            document.getElementById('detail-games').innerHTML = wonder.games.map(g => {
                let cls = g === 5 ? 'bg-blue-900/60 text-blue-300 border-blue-700/50' : 
                         (g === 6 ? 'bg-purple-900/60 text-purple-300 border-purple-700/50' : 'bg-red-900/60 text-red-300 border-red-700/50');
                let txt = g === 5 ? 'Civ 5' : (g === 6 ? 'Civ 6' : 'Civ 7');
                return `<span class="text-xs px-2 py-0.5 rounded mr-1 border ${cls}">${txt}</span>`;
            }).join('');

            document.getElementById('detail-name').innerText = wonder.name;
            document.getElementById('detail-coords').innerText = `${wonder.lat > 0 ? 'N' : 'S'} ${Math.abs(wonder.lat).toFixed(2)}°, ${wonder.lon > 0 ? 'E' : 'W'} ${Math.abs(wonder.lon).toFixed(2)}°`;
            
            document.getElementById('game-img-label').innerText = isNatural ? "游戏内地貌" : "游戏内模型";
            document.getElementById('game-desc-title').innerHTML = `<span class="w-1.5 h-4 ${isNatural ? 'bg-green-500' : 'bg-yellow-500'} rounded-full mr-2"></span> 世代机制解析`;

            const realImgEl = document.getElementById('real-img');
            const gameImgEl = document.getElementById('game-img');
            
            // 每次打开面板前重置图片滤镜
            gameImgEl.style.filter = 'none';
            
            realImgEl.src = getFallbackImage(wonder.name, '正在连接维基百科...', false);
            gameImgEl.src = getFallbackImage(wonder.name, '正在载入设定图...', true);

            // Fetch 机制升级：通过闭包传递获取到的真实历史图片地址，以供游戏图片拉取失败时做“降级滤镜渲染”
            fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wonder.wiki)}`)
                .then(res => res.json())
                .then(data => { 
                    const wikiUrl = data.thumbnail ? data.thumbnail.source : null;
                    if (wikiUrl) {
                        realImgEl.src = wikiUrl;
                    } else {
                        realImgEl.src = getFallbackImage(wonder.name, '无词条主图', false);
                    }
                    // 在获取到维基图后，再去请求 Fandom 游戏图（并将 wikiUrl 传给它作为备胎）
                    fetchGameImage(wikiUrl);
                })
                .catch(() => { 
                    realImgEl.src = getFallbackImage(wonder.name, '网络超时', false); 
                    fetchGameImage(null);
                });

            // 获取游戏原画的核心方法，内置降级渲染机制
            function fetchGameImage(fallbackWikiUrl) {
                fetch(`https://civilization.fandom.com/api.php?action=query&titles=File:${encodeURIComponent(wonder.gamePic)}&prop=imageinfo&iiprop=url&format=json&origin=*`)
                    .then(res => res.json())
                    .then(data => {
                        const pages = data.query.pages;
                        const pageId = Object.keys(pages)[0];
                        if (pageId !== "-1" && pages[pageId].imageinfo) {
                            gameImgEl.src = pages[pageId].imageinfo[0].url;
                        } else {
                            applyConceptArtFallback(fallbackWikiUrl);
                        }
                    })
                    .catch(() => { 
                        applyConceptArtFallback(fallbackWikiUrl); 
                    });
            }

            // 当官方图库缺失时（特别是新出的文明7奇观），自动复用历史照片，并施加“文明复古风”CSS滤镜
            function applyConceptArtFallback(wikiUrl) {
                if (wikiUrl) {
                    gameImgEl.src = wikiUrl;
                    // 应用类似文明游戏质感的暖色调/复古滤镜
                    gameImgEl.style.filter = 'sepia(0.55) hue-rotate(345deg) saturate(1.4) contrast(1.15) brightness(0.95)';
                    document.getElementById('game-img-label').innerText = "概念设定 (由AI降级渲染)";
                } else {
                    gameImgEl.src = getFallbackImage(wonder.name, '图库暂未收录原画', true);
                }
            }
            
            document.getElementById('detail-real-desc').innerText = wonder.realDesc;
            document.getElementById('detail-game-desc').innerText = wonder.gameDesc;
        }

        function closeDetailPanel() {
            document.getElementById('detail-panel').classList.add('hidden');
            isWonderSelected = false;
            updateCameraOffset(false);
        }

        // --- 3D 渲染逻辑 ---
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020208);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.enablePan = false;
            controls.minDistance = 6;
            controls.maxDistance = 18;

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 10, 10);
            scene.add(sun);

            createEarth();
            addMarkers();

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            window.addEventListener('resize', onResize);
            renderer.domElement.addEventListener('click', onClick);
        }

        function createEarth() {
            earthGroup = new THREE.Group();
            scene.add(earthGroup);
            const loader = new THREE.TextureLoader();
            // 真实地理卫星贴图
            const earthTexture = loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
            const earthMesh = new THREE.Mesh(
                new THREE.SphereGeometry(EARTH_RADIUS, 64, 64),
                new THREE.MeshPhongMaterial({ map: earthTexture, shininess: 10 })
            );
            earthGroup.add(earthMesh);
            
            const glow = new THREE.Mesh(
                new THREE.SphereGeometry(EARTH_RADIUS + 0.1, 64, 64),
                new THREE.MeshBasicMaterial({ color: 0x4f86f7, transparent: true, opacity: 0.1, side: THREE.BackSide })
            );
            earthGroup.add(glow);
        }

        function latLongToPos(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -(radius * Math.sin(phi) * Math.cos(theta)),
                (radius * Math.cos(phi)),
                (radius * Math.sin(phi) * Math.sin(theta))
            );
        }

        function createTextSprite(text, color) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = 'bold 36px "Segoe UI"';
            const w = ctx.measureText(text).width + 20;
            canvas.width = w; canvas.height = 50;
            ctx.font = 'bold 36px "Segoe UI"';
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.shadowColor = "black"; ctx.shadowBlur = 5;
            ctx.fillStyle = color;
            ctx.fillText(text, w/2, 25);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            // 因为奇观数量大增，文字默认缩小一点，防止遮挡
            sprite.scale.set(w * 0.0022, 50 * 0.0022, 1);
            return sprite;
        }

        function addMarkers() {
            wondersData.forEach(w => {
                const pos = latLongToPos(w.lat, w.lon, EARTH_RADIUS);
                // 自然奇观绿色，人造奇观金色
                const color = w.type === 'natural' ? 0x4ade80 : 0xfacc15;
                
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.04, 16, 16),
                    new THREE.MeshBasicMaterial({ color: color })
                );
                dot.position.copy(pos);
                dot.userData = w;
                earthGroup.add(dot);
                markers.push(dot);

                const ring = new THREE.Mesh(
                    new THREE.RingGeometry(0.06, 0.07, 16),
                    new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
                );
                ring.position.copy(pos);
                ring.lookAt(0,0,0);
                earthGroup.add(ring);

                const label = createTextSprite(w.name, w.type === 'natural' ? '#4ade80' : '#fde047');
                label.position.copy(pos.clone().normalize().multiplyScalar(EARTH_RADIUS * 1.03));
                earthGroup.add(label);
                textSprites.push(label);
            });
        }

        function focusOnWonder(w) {
            const marker = markers.find(m => m.userData.id === w.id);
            const worldPos = new THREE.Vector3();
            marker.getWorldPosition(worldPos);
            targetCameraPos.copy(worldPos).normalize().multiplyScalar(EARTH_RADIUS * 2.2);
            isAnimatingCamera = true;
            showDetailPanel(w);
        }

        function updateCameraOffset(open) {
            if (open) { camera.setViewOffset(window.innerWidth, window.innerHeight, 90, 0, window.innerWidth, window.innerHeight); }
            else { camera.clearViewOffset(); }
            camera.updateProjectionMatrix();
        }

        function onClick(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(markers);
            if (intersects.length > 0) focusOnWonder(intersects[0].object.userData);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateCameraOffset(isWonderSelected);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isAnimatingCamera) {
                camera.position.lerp(targetCameraPos, 0.05);
                camera.lookAt(0, 0, 0);
                if (camera.position.distanceTo(targetCameraPos) < 0.05) isAnimatingCamera = false;
            } else { controls.update(); }
            if (!isWonderSelected) earthGroup.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }

        window.onload = () => { initUI(); initThreeJS(); animate(); };
    </script>
</body>
